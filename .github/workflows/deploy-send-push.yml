name: Pubblica notifiche push

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v4

      - name: Installa Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Pubblica send-push
        run: supabase functions deploy send-push --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
